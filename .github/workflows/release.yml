name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kubewise

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend API ──────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend Dashboard ───────────────────────────────────────────────────
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.TAG }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.version.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Agent ────────────────────────────────────────────────────────────────
      - name: Build and push Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-agent:${{ steps.version.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Update GitOps repo image tags ───────────────────────────────────────
      # Requires a repo secret GITOPS_TOKEN with write access to the gitops repo.
      - name: Update ArgoCD image tags in gitops repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${GITOPS_TOKEN}@github.com/jamilshaikh07/talos-proxmox-gitops.git" \
            /tmp/gitops
          sed -i \
            "s/value: \"[^\"]*\" # bumped automatically by CI/value: \"${TAG}\" # bumped automatically by CI/g" \
            /tmp/gitops/gitops/apps/kubewise.yaml
          cd /tmp/gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/kubewise.yaml
          git diff --cached --quiet || \
            git commit -m "chore(kubewise): bump images to ${TAG}" && git push

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "KubeWise ${{ steps.version.outputs.TAG }}"
          body: |
            ## Images

            ```
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.version.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}-agent:${{ steps.version.outputs.TAG }}
            ```

            ## Deploy

            ArgoCD image tags in the gitops repo are updated automatically.
            Sync the `kubewise` ArgoCD app to deploy.

{{- if .Values.ingress.enabled -}}
{{- $ns := .Values.global.namespace -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubewise
  namespace: {{ $ns }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: {{ .Values.ingress.dashboard.path }}
            pathType: Prefix
            backend:
              service:
                name: kubewise-dashboard
                port:
                  number: {{ .Values.dashboard.service.port }}
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: {{ .Values.ingress.api.path }}
            pathType: Prefix
            backend:
              service:
                name: kubewise-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}

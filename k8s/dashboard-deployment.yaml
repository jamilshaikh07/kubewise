apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubewise-dashboard
  namespace: kubewise
  labels:
    app: kubewise-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubewise-dashboard
  template:
    metadata:
      labels:
        app: kubewise-dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: dashboard
          image: ghcr.io/jamilshaikh07/kubewise-dashboard:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://kubewise-api:8000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubewise-dashboard
  namespace: kubewise
spec:
  selector:
    app: kubewise-dashboard
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
